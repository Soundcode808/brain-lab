name: 호프 훈련 세션

on:
  schedule:
    - cron: '0 * * * *'   # 매 1시간마다
  workflow_dispatch:       # 웹에서 수동 실행 버튼도 생김

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: numpy 설치
        run: pip install numpy

      - name: 호프_A 훈련 (v2 — 감정·판단·예측·메타인지·항상성)
        run: python3 호프/인큐베이터_v2.py

      - name: 호프_B 훈련 (A 신호 수신 + B→A 피드백 저장)
        run: python3 호프_B/인큐베이터_B.py

      - name: 성장 기록 저장
        run: |
          git config user.name "호프 인큐베이터"
          git config user.email "hope@brain-lab.ai"
          git fetch origin main
          git reset --soft origin/main
          git add 호프/연결상태.npy
          git add 호프/성장기록.json
          git add 호프/마음상태.json
          git add 호프/A신호.json
          git add 호프_B/연결상태_B.npy
          git add 호프_B/성장기록_B.json
          git add 호프_B/B신호.json
          git diff --cached --quiet || git commit -m "호프 A·B 성장 $(date '+%Y-%m-%d')"
          git push
